<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Gerçekçi 101 Okey Masası</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #1b4d29; color: white; margin: 0; padding: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; user-select: none; }
        
        /* OYUN MASASI DÜZENİ (GRID) */
        .masa-container { display: grid; grid-template-columns: 150px 1fr 150px; grid-template-rows: 100px 1fr 200px; gap: 20px; width: 95vw; max-width: 1200px; height: 90vh; }
        
        /* BOT KONUMLARI */
        .oyuncu-kart { background: rgba(0,0,0,0.6); padding: 10px; border-radius: 10px; text-align: center; display: flex; flex-direction: column; justify-content: center; align-items: center; border: 2px solid #27ae60; }
        #bot2-alan { grid-column: 2; grid-row: 1; flex-direction: row; gap: 20px; }
        #bot1-alan { grid-column: 1; grid-row: 2; }
        #bot3-alan { grid-column: 3; grid-row: 2; }
        #benim-alan { grid-column: 2; grid-row: 3; display: flex; flex-direction: column; align-items: center; gap: 10px; }

        /* ORTA MASA (DESTE VE AÇILANLAR) */
        .orta-masa { grid-column: 2; grid-row: 2; background: #0e3519; border-radius: 100px; padding: 30px; display: flex; flex-direction: column; box-shadow: inset 0 0 50px rgba(0,0,0,0.8); border: 15px solid #2ecc71; position: relative; }
        
        .cekme-ve-cop { display: flex; justify-content: center; gap: 40px; margin-bottom: 20px; }
        .deste, .cop { width: 45px; height: 65px; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-weight: bold; font-size: 18px; cursor: pointer; box-shadow: 3px 3px 10px rgba(0,0,0,0.6); }
        .deste { background: #ecf0f1; color: #2c3e50; border: 2px solid #bdc3c7; }
        .deste:hover { background: #bdc3c7; }
        .cop { background: #7f8c8d; color: #2c3e50; border: 2px dashed #bdc3c7; }

        /* YERE AÇILAN TAŞLAR ALANI */
        .yere-acilanlar { flex-grow: 1; background: rgba(0,0,0,0.3); border-radius: 20px; padding: 15px; display: flex; flex-wrap: wrap; gap: 10px; align-content: flex-start; border: 2px dashed #f1c40f; }
        
        /* ÇİFT KATLI ISTAKA TASARIMI */
        .istaka { background: #5c2e0b; padding: 15px; border-radius: 15px; width: 100%; max-width: 800px; display: flex; flex-direction: column; gap: 8px; box-shadow: inset 0 20px 20px rgba(0,0,0,0.7), 0 10px 20px rgba(0,0,0,0.5); border-bottom: 8px solid #3e1e06; border-left: 5px solid #8b4513; border-right: 5px solid #8b4513; }
        .istaka-raf { height: 75px; background: rgba(0,0,0,0.2); border-radius: 5px; display: flex; gap: 3px; padding: 5px; box-shadow: inset 0 5px 10px rgba(0,0,0,0.5); overflow-x: auto; align-items: center; }

        /* TAŞ TASARIMI */
        .tas { width: 40px; height: 60px; background: #fffcf0; border-radius: 6px; display: flex; align-items: center; justify-content: center; font-size: 22px; font-weight: 900; color: black; box-shadow: 2px 2px 5px rgba(0,0,0,0.4), inset 0 0 5px rgba(255,255,255,0.8); cursor: pointer; transition: transform 0.1s; border: 1px solid #dcdde1; }
        .tas:hover { transform: translateY(-5px); }
        .tas.secili { transform: translateY(-15px); border: 2px solid #e74c3c; box-shadow: 0 0 15px #e74c3c; }
        
        /* RENKLER */
        .sari { color: #f39c12; }
        .mavi { color: #2980b9; }
        .siyah { color: #2c3e50; }
        .kirmizi { color: #c0392b; }
        .joker { color: #8e44ad; font-size: 26px; }

        /* KONTROLLER */
        .buton-grubu { display: flex; gap: 15px; margin-top: 10px; }
        button { padding: 10px 20px; font-size: 16px; font-weight: bold; cursor: pointer; border: none; border-radius: 5px; color: white; transition: 0.2s; }
        .btn-at { background: #e74c3c; } .btn-at:hover { background: #c0392b; }
        .btn-ac { background: #f39c12; } .btn-ac:hover { background: #d68910; }

        #sira-bilgi { position: absolute; top: 10px; left: 20px; font-size: 24px; color: #f1c40f; font-weight: bold; }
    </style>
</head>
<body>

    <div id="sira-bilgi">Sıra: Sen</div>

    <div class="masa-container">
        
        <div class="oyuncu-kart" id="bot2-alan">
            <h3>Bot 2 (Karşı)</h3>
            <p>Kalan Taş: <span id="bot2-sayi">21</span></p>
        </div>

        <div class="oyuncu-kart" id="bot1-alan">
            <h3>Bot 1 (Sol)</h3>
            <p>Kalan Taş: <br><span id="bot1-sayi">21</span></p>
        </div>

        <div class="orta-masa">
            <div class="cekme-ve-cop">
                <div class="deste" onclick="tasCek()">ÇEK<br><span id="deste-sayi">0</span></div>
                <div class="cop" id="yandaki-cop">Boş</div>
            </div>
            <div class="yere-acilanlar" id="masadaki-seriler">
                <div style="width: 100%; text-align: center; color: rgba(255,255,255,0.5);">Yere Açılan Taşlar Buraya Gelecek</div>
            </div>
        </div>

        <div class="oyuncu-kart" id="bot3-alan">
            <h3>Bot 3 (Sağ)</h3>
            <p>Kalan Taş: <br><span id="bot3-sayi">21</span></p>
        </div>

        <div id="benim-alan">
            <div class="istaka">
                <div class="istaka-raf" id="ust-raf"></div>
                <div class="istaka-raf" id="alt-raf"></div>
            </div>
            
            <div class="buton-grubu">
                <button class="btn-at" id="btn-at" onclick="tasAt()" style="display: none;">Seçili Taşı At</button>
                <button class="btn-ac" id="btn-ac" onclick="yereAc()">Seçili Taşı Yere Aç</button>
            </div>
        </div>

    </div>

    <script>
        const renkler = ["sari", "mavi", "siyah", "kirmizi"];
        let deste = [];
        let oyuncuTasi = [];
        let bot1Tasi = [], bot2Tasi = [], bot3Tasi = [];
        let atilanTaslar = [];
        let seciliTasIndex = null;
        let siraKimde = 0; // 0: Sen, 1, 2, 3: Botlar
        let tasCekildiMi = false;

        function oyunuBaslat() {
            // Taşları Üret ve Karıştır
            for (let i = 0; i < 2; i++) {
                renkler.forEach(renk => {
                    for (let sayi = 1; sayi <= 13; sayi++) {
                        deste.push({ renk: renk, sayi: sayi });
                    }
                });
            }
            deste.push({ renk: "joker", sayi: "★" }, { renk: "joker", sayi: "★" });
            deste = deste.sort(() => Math.random() - 0.5);

            // Dağıt
            oyuncuTasi = deste.splice(0, 22);
            bot1Tasi = deste.splice(0, 21);
            bot2Tasi = deste.splice(0, 21);
            bot3Tasi = deste.splice(0, 21);

            // Oyuncu taşlarını sırala
            oyuncuTasi.sort((a, b) => a.renk.localeCompare(b.renk) || a.sayi - b.sayi);

            istakayiCiz();
            guncelle();
        }

        function istakayiCiz() {
            const ustRaf = document.getElementById("ust-raf");
            const altRaf = document.getElementById("alt-raf");
            ustRaf.innerHTML = "";
            altRaf.innerHTML = "";

            oyuncuTasi.forEach((tas, index) => {
                let tasDiv = document.createElement("div");
                tasDiv.className = `tas ${tas.renk}`;
                tasDiv.innerText = tas.sayi;
                if(index === seciliTasIndex) tasDiv.classList.add("secili");

                tasDiv.onclick = () => {
                    if (siraKimde !== 0) return;
                    seciliTasIndex = index;
                    istakayiCiz(); // Seçimi güncelle
                };

                // Taşları 2 rafa bölüştür (İlk 11 taş üste, kalanı alta)
                if (index < 11) ustRaf.appendChild(tasDiv);
                else altRaf.appendChild(tasDiv);
            });
        }

        function guncelle() {
            document.getElementById("deste-sayi").innerText = deste.length;
            document.getElementById("bot1-sayi").innerText = bot1Tasi.length;
            document.getElementById("bot2-sayi").innerText = bot2Tasi.length;
            document.getElementById("bot3-sayi").innerText = bot3Tasi.length;

            let copDiv = document.getElementById("yandaki-cop");
            if (atilanTaslar.length > 0) {
                let sonTas = atilanTaslar[atilanTaslar.length - 1];
                copDiv.className = `cop tas ${sonTas.renk}`;
                copDiv.innerText = sonTas.sayi;
            }

            document.getElementById("btn-at").style.display = tasCekildiMi ? "inline-block" : "none";
        }

        function tasCek() {
            if (siraKimde !== 0) return alert("Sıra sende değil!");
            if (tasCekildiMi) return alert("Zaten taş çektin.");
            
            oyuncuTasi.push(deste.pop());
            tasCekildiMi = true;
            istakayiCiz();
            guncelle();
        }

        function tasAt() {
            if (seciliTasIndex === null) return alert("Lütfen atılacak bir taş seçin.");
            
            let atilan = oyuncuTasi.splice(seciliTasIndex, 1)[0];
            atilanTaslar.push(atilan);
            seciliTasIndex = null;
            tasCekildiMi = false;
            
            siraKimde = 1; // Bot 1'e geç
            istakayiCiz();
            guncelle();
            siraKontrol();
        }

        function yereAc() {
            if (seciliTasIndex === null) return alert("Yere açmak için bir taş seçin.");
            
            let acilanTas = oyuncuTasi.splice(seciliTasIndex, 1)[0];
            seciliTasIndex = null;
            
            let masa = document.getElementById("masadaki-seriler");
            // Eğer "Yere Açılan Taşlar Buraya Gelecek" yazısı duruyorsa temizle
            if(masa.innerText.includes("Gelecek")) masa.innerHTML = "";

            let tasDiv = document.createElement("div");
            tasDiv.className = `tas ${acilanTas.renk}`;
            tasDiv.innerText = acilanTas.sayi;
            masa.appendChild(tasDiv);

            istakayiCiz();
        }

        function siraKontrol() {
            const isimler = ["Sen", "Bot 1", "Bot 2", "Bot 3"];
            document.getElementById("sira-bilgi").innerText = `Sıra: ${isimler[siraKimde]}`;

            if (siraKimde !== 0) {
                setTimeout(botOynasin, 1200);
            }
        }

        function botOynasin() {
            let aktifBot = (siraKimde === 1) ? bot1Tasi : (siraKimde === 2) ? bot2Tasi : bot3Tasi;
            
            aktifBot.push(deste.pop()); // Taş çek
            let atilan = aktifBot.splice(Math.floor(Math.random() * aktifBot.length), 1)[0]; // Rastgele at
            atilanTaslar.push(atilan);
            
            siraKimde++;
            if (siraKimde > 3) siraKimde = 0;
            
            guncelle();
            siraKontrol();
        }

        oyunuBaslat();
    </script>
</body>
</html>
