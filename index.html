<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>101 Okey Simülasyonu</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #1e5f32; color: white; margin: 0; padding: 20px; text-align: center; user-select: none; }
        .oyun-masasi { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 85vh; }
        
        .bot-alani { display: flex; justify-content: space-between; width: 100%; max-width: 800px; margin-bottom: 20px; }
        .bot { background: rgba(0,0,0,0.5); padding: 15px; border-radius: 10px; width: 30%; }
        
        .orta-alan { display: flex; gap: 50px; margin: 30px 0; padding: 20px; background: rgba(255,255,255,0.1); border-radius: 15px; }
        
        .deste, .cop { width: 50px; height: 70px; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-weight: bold; font-size: 20px; cursor: pointer; box-shadow: 2px 2px 5px rgba(0,0,0,0.5); }
        .deste { background: #ecf0f1; color: #2c3e50; border: 2px solid #bdc3c7; }
        .deste:hover { background: #bdc3c7; }
        .cop { background: #bdc3c7; color: #2c3e50; border: 2px dashed #7f8c8d; cursor: default; }

        .istaka-alani { margin-top: 20px; }
        .istaka { display: flex; background: #8B4513; padding: 15px; border-radius: 10px; min-width: 800px; min-height: 80px; box-shadow: inset 0 0 15px rgba(0,0,0,0.8); gap: 5px; overflow-x: auto; border-bottom: 5px solid #5c2e0b; }
        
        .tas { width: 45px; height: 65px; background: #fffcf0; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 24px; font-weight: 900; color: black; box-shadow: 2px 2px 4px rgba(0,0,0,0.4); cursor: pointer; transition: transform 0.1s; border: 1px solid #dcdde1; }
        .tas:hover { transform: translateY(-10px); }
        .tas.secili { transform: translateY(-15px); border: 2px solid #e74c3c; box-shadow: 0 0 10px red; }
        
        .sari { color: #f39c12; }
        .mavi { color: #2980b9; }
        .siyah { color: #2c3e50; }
        .kirmizi { color: #c0392b; }
        .joker { color: #8e44ad; font-size: 30px; }

        .bilgi { font-size: 20px; font-weight: bold; margin-bottom: 10px; color: #f1c40f; }
        .btn-at { margin-top: 15px; padding: 10px 30px; font-size: 18px; cursor: pointer; background: #e74c3c; color: white; border: none; border-radius: 5px; display: none; }
        .btn-at:hover { background: #c0392b; }
    </style>
</head>
<body>

    <h1>101 Okey (Temel Motor)</h1>
    <div class="bilgi" id="sira-bilgisi">Oyun Yükleniyor...</div>

    <div class="oyun-masasi">
        <div class="bot-alani">
            <div class="bot" id="bot1">Bot 1 (Sol)<br>Taş: <span id="bot1-sayi">21</span></div>
            <div class="bot" id="bot2">Bot 2 (Karşı)<br>Taş: <span id="bot2-sayi">21</span></div>
            <div class="bot" id="bot3">Bot 3 (Sağ)<br>Taş: <span id="bot3-sayi">21</span></div>
        </div>

        <div class="orta-alan">
            <div class="deste" id="ortadaki-deste" onclick="tasCek()">ÇEK<br>(<span id="deste-sayi">0</span>)</div>
            <div class="cop" id="yandaki-cop">Boş</div>
        </div>

        <div class="istaka-alani">
            <div class="istaka" id="benim-istakam"></div>
            <button class="btn-at" id="tas-at-btn" onclick="tasAt()">Seçili Taşı At</button>
        </div>
    </div>

    <script>
        // 1. OYUN DEĞİŞKENLERİ
        const renkler = ["sari", "mavi", "siyah", "kirmizi"];
        let deste = [];
        let oyuncuTasi = [];
        let bot1Tasi = [], bot2Tasi = [], bot3Tasi = [];
        let atilanTaslar = [];
        let seciliTasIndex = null;
        let siraKimde = 0; // 0: Sen, 1: Bot1, 2: Bot2, 3: Bot3
        let tasCekildiMi = false;

        // HTML Elementleri
        const istakaDiv = document.getElementById("benim-istakam");
        const bilgiDiv = document.getElementById("sira-bilgisi");
        const desteSayiDiv = document.getElementById("deste-sayi");
        const atBtn = document.getElementById("tas-at-btn");
        const copDiv = document.getElementById("yandaki-cop");

        // 2. TAŞLARI OLUŞTUR VE KARIŞTIR
        function oyunuBaslat() {
            // 106 Taş oluştur
            for (let i = 0; i < 2; i++) {
                renkler.forEach(renk => {
                    for (let sayi = 1; sayi <= 13; sayi++) {
                        deste.push({ renk: renk, sayi: sayi });
                    }
                });
            }
            deste.push({ renk: "joker", sayi: "★" }, { renk: "joker", sayi: "★" });

            // Karıştır
            deste = deste.sort(() => Math.random() - 0.5);

            // Dağıt
            oyuncuTasi = deste.splice(0, 22); // İlk oyuncuya 22
            bot1Tasi = deste.splice(0, 21);
            bot2Tasi = deste.splice(0, 21);
            bot3Tasi = deste.splice(0, 21);

            istakayiCiz();
            guncelle();
            siraKontrol();
        }

        // 3. ISTAKAYI EKRANA ÇİZME
        function istakayiCiz() {
            istakaDiv.innerHTML = "";
            // Taşları renklere ve sayılara göre basitçe sırala
            oyuncuTasi.sort((a, b) => a.renk.localeCompare(b.renk) || a.sayi - b.sayi);

            oyuncuTasi.forEach((tas, index) => {
                let tasDiv = document.createElement("div");
                tasDiv.className = `tas ${tas.renk}`;
                tasDiv.innerText = tas.sayi;
                
                if(index === seciliTasIndex) tasDiv.classList.add("secili");

                tasDiv.onclick = () => {
                    if (siraKimde !== 0) return; // Sıra sende değilse dokunma
                    seciliTasIndex = index;
                    istakayiCiz(); // Seçimi göstermek için yeniden çiz
                    if(tasCekildiMi) atBtn.style.display = "inline-block"; // Taş çekildiyse atma butonu çıksın
                };
                istakaDiv.appendChild(tasDiv);
            });
        }

        // 4. EKRAN GÜNCELLEMELERİ
        function guncelle() {
            desteSayiDiv.innerText = deste.length;
            document.getElementById("bot1-sayi").innerText = bot1Tasi.length;
            document.getElementById("bot2-sayi").innerText = bot2Tasi.length;
            document.getElementById("bot3-sayi").innerText = bot3Tasi.length;

            if (atilanTaslar.length > 0) {
                let sonTas = atilanTaslar[atilanTaslar.length - 1];
                copDiv.className = `cop tas ${sonTas.renk}`;
                copDiv.innerText = sonTas.sayi;
            } else {
                copDiv.className = "cop";
                copDiv.innerText = "Boş";
            }
        }

        // 5. OYUNCU HAMLELERİ (TAŞ ÇEKME)
        function tasCek() {
            if (siraKimde !== 0) return alert("Sıra sende değil!");
            if (tasCekildiMi) return alert("Zaten taş çektin, bir taş atmalısın.");
            if (deste.length === 0) return alert("Ortada taş kalmadı! Oyun Bitti.");

            let cekilenTas = deste.pop();
            oyuncuTasi.push(cekilenTas);
            tasCekildiMi = true;
            istakayiCiz();
            guncelle();
        }

        // 6. OYUNCU HAMLELERİ (TAŞ ATMA)
        function tasAt() {
            if (seciliTasIndex === null) return;

            let atilan = oyuncuTasi.splice(seciliTasIndex, 1)[0];
            atilanTaslar.push(atilan);
            
            seciliTasIndex = null;
            tasCekildiMi = false;
            atBtn.style.display = "none";
            
            istakayiCiz();
            guncelle();

            // Sırayı Bot 1'e geçir
            siraKimde = 1;
            siraKontrol();
        }

        // 7. OYUN DÖNGÜSÜ VE BOT MANTIĞI
        function siraKontrol() {
            const botIsimleri = ["Sen", "Bot 1", "Bot 2", "Bot 3"];
            bilgiDiv.innerText = `Sıra: ${botIsimleri[siraKimde]}`;

            if (siraKimde !== 0) {
                // Botun düşünme süresi simülasyonu (1.5 saniye)
                setTimeout(botOynasin, 1500);
            }
        }

        function botOynasin() {
            if (deste.length === 0) return alert("Oyun Bitti!");

            let aktifBotTasi = (siraKimde === 1) ? bot1Tasi : (siraKimde === 2) ? bot2Tasi : bot3Tasi;

            // Bot ortadan taş çeker
            aktifBotTasi.push(deste.pop());

            // Bot rastgele bir taşı atar (Yapay zeka şimdilik sadece rastgele atıyor)
            let rastgeleIndex = Math.floor(Math.random() * aktifBotTasi.length);
            let atilan = aktifBotTasi.splice(rastgeleIndex, 1)[0];
            
            atilanTaslar.push(atilan);
            guncelle();

            // Sırayı bir sonrakine devret
            siraKimde++;
            if (siraKimde > 3) siraKimde = 0; // Başa (Sana) dön
            
            siraKontrol();
        }

        // OYUNU BAŞLAT
        oyunuBaslat();

    </script>
</body>
</html>
