<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>101 Okey - Gelişmiş Kurallar</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background-color: #1b4d29; color: white; margin: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; user-select: none; }
        
        .masa-container { display: grid; grid-template-columns: 150px 1fr 150px; grid-template-rows: 100px 1fr auto; gap: 20px; width: 98vw; max-width: 1400px; height: 95vh; }
        
        /* BOT VE MASA ALANLARI */
        .oyuncu-kart { background: rgba(0,0,0,0.6); padding: 10px; border-radius: 10px; text-align: center; border: 2px solid #27ae60; display: flex; flex-direction: column; justify-content: center; }
        #bot2-alan { grid-column: 2; grid-row: 1; flex-direction: row; align-items: center; gap: 20px; }
        #bot1-alan { grid-column: 1; grid-row: 2; }
        #bot3-alan { grid-column: 3; grid-row: 2; }

        .orta-masa { grid-column: 2; grid-row: 2; background: #0e3519; border-radius: 80px; padding: 20px; display: flex; flex-direction: column; box-shadow: inset 0 0 50px rgba(0,0,0,0.8); border: 15px solid #2ecc71; }
        .cekme-ve-cop { display: flex; justify-content: center; gap: 40px; margin-bottom: 20px; }
        
        .deste { width: 50px; height: 75px; background: #ecf0f1; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-weight: bold; font-size: 18px; color: #2c3e50; cursor: pointer; border: 2px solid #bdc3c7; }
        .cop { width: 50px; height: 75px; background: rgba(0,0,0,0.4); border-radius: 8px; display: flex; flex-direction: column; align-items: center; justify-content: center; font-weight: bold; font-size: 12px; color: white; border: 2px dashed #f1c40f; transition: 0.2s; text-align: center; }
        .cop.drag-over { background: #e74c3c; border-color: white; transform: scale(1.1); }

        .yere-acilanlar { flex-grow: 1; background: rgba(0,0,0,0.3); border-radius: 20px; padding: 15px; display: flex; flex-wrap: wrap; gap: 15px; border: 2px dashed #f1c40f; overflow-y: auto; }
        .per-grubu { display: flex; gap: 2px; background: rgba(255,255,255,0.1); padding: 5px; border-radius: 8px; }

        /* ISTAKA VE BUTONLAR */
        #benim-alan { grid-column: 2; grid-row: 3; display: flex; flex-direction: column; align-items: center; gap: 10px; }
        .istaka-izgara { background: #5c2e0b; padding: 15px; border-radius: 15px; display: grid; grid-template-columns: repeat(17, 45px); grid-template-rows: 65px 65px; gap: 5px; box-shadow: inset 0 20px 20px rgba(0,0,0,0.7); border-bottom: 8px solid #3e1e06; }
        .slot { background: rgba(0,0,0,0.2); border-radius: 6px; width: 100%; height: 100%; box-shadow: inset 0 2px 5px rgba(0,0,0,0.5); display: flex; align-items: center; justify-content: center; }
        .slot.drag-over { background: rgba(255,255,255,0.2); }

        /* TAŞ TASARIMI VE SEÇİM EFEKTİ */
        .tas { width: 45px; height: 65px; background: #fffcf0; border-radius: 6px; display: flex; align-items: center; justify-content: center; font-size: 24px; font-weight: 900; box-shadow: 2px 2px 5px rgba(0,0,0,0.4); cursor: grab; border: 1px solid #dcdde1; transition: transform 0.1s, border 0.1s; }
        .tas:active { cursor: grabbing; }
        
        /* Tıklanıp seçilen taşlar havaya kalkar */
        .tas.secili { transform: translateY(-15px); border: 3px solid #f1c40f; box-shadow: 0 0 15px #f1c40f; }
        
        .sari { color: #f39c12; } .mavi { color: #2980b9; } .siyah { color: #2c3e50; } .kirmizi { color: #c0392b; }

        /* KONTROLLER */
        .buton-grubu { display: flex; gap: 10px; }
        button { padding: 10px 15px; font-size: 14px; font-weight: bold; cursor: pointer; border: none; border-radius: 5px; color: white; transition: 0.2s; }
        .btn-mavi { background: #3498db; } .btn-mavi:hover { background: #2980b9; }
        .btn-yesil { background: #27ae60; } .btn-yesil:hover { background: #2ecc71; }

        #sira-bilgi { position: absolute; top: 10px; left: 20px; font-size: 24px; color: #f1c40f; font-weight: bold; }
        #toplam-puan { position: absolute; top: 40px; left: 20px; font-size: 18px; color: white; }
    </style>
</head>
<body>

    <div id="sira-bilgi">Sıra: Sen</div>
    <div id="toplam-puan">Seçili Toplam: 0</div>

    <div class="masa-container">
        <div class="oyuncu-kart" id="bot2-alan"><h3>Bot 2</h3><p>Kalan: <span id="bot2-sayi">21</span></p></div>
        <div class="oyuncu-kart" id="bot1-alan"><h3>Bot 1</h3><p>Kalan:<br><span id="bot1-sayi">21</span></p></div>

        <div class="orta-masa">
            <div class="cekme-ve-cop">
                <div class="deste" onclick="tasCek()">ÇEK<br><span id="deste-sayi">0</span></div>
                <div class="cop" id="yandaki-cop">SÜRÜKLE<br>VE AT</div>
            </div>
            <div class="yere-acilanlar" id="masadaki-seriler"></div>
        </div>

        <div class="oyuncu-kart" id="bot3-alan"><h3>Bot 3</h3><p>Kalan:<br><span id="bot3-sayi">21</span></p></div>

        <div id="benim-alan">
            <div class="buton-grubu">
                <button class="btn-mavi" onclick="seriDiz()">Seri Diz</button>
                <button class="btn-mavi" onclick="ciftDiz()">Çift Diz</button>
                <button class="btn-yesil" onclick="secilileriAc()">Seçili Taşları Yere Aç (Kural: 101)</button>
            </div>
            <div class="istaka-izgara" id="istaka-izgara"></div>
        </div>
    </div>

    <script>
        const renkler = ["sari", "mavi", "siyah", "kirmizi"];
        let deste = [], bot1Tasi = [], bot2Tasi = [], bot3Tasi = [], atilanTaslar = [];
        let siraKimde = 0; 
        let tasCekildiMi = false;
        let ilkAcilisYapildiMi = false; // 101 barajı geçildi mi kontrolü

        let istakaSlots = new Array(34).fill(null);
        let seciliSlotlar = []; // Tıklanarak seçilen taşların indeksleri

        function oyunuBaslat() {
            for (let i = 0; i < 2; i++) {
                renkler.forEach(renk => {
                    for (let sayi = 1; sayi <= 13; sayi++) { deste.push({ renk, sayi }); }
                });
            }
            deste.push({ renk: "siyah", sayi: "★" }, { renk: "siyah", sayi: "★" });
            deste = deste.sort(() => Math.random() - 0.5);

            let oyuncuIlkTaslari = deste.splice(0, 22);
            for(let i=0; i<22; i++) istakaSlots[i] = oyuncuIlkTaslari[i];

            bot1Tasi = deste.splice(0, 21);
            bot2Tasi = deste.splice(0, 21);
            bot3Tasi = deste.splice(0, 21);

            seriDiz(); // Başlangıçta otomatik seri dizsin
        }

        // --- DİZİLİM FONKSİYONLARI ---
        function seriDiz() {
            seciliSlotlar = []; // Seçimleri sıfırla
            let taslar = istakaSlots.filter(t => t !== null);
            // Önce renge, sonra sayıya göre sırala (Seri mantığı)
            taslar.sort((a, b) => {
                if (a.renk === b.renk) return (a.sayi === '★' ? 0 : a.sayi) - (b.sayi === '★' ? 0 : b.sayi);
                return a.renk.localeCompare(b.renk);
            });
            istakaSlots = new Array(34).fill(null);
            taslar.forEach((t, i) => istakaSlots[i] = t);
            istakayiCiz();
        }

        function ciftDiz() {
            seciliSlotlar = [];
            let taslar = istakaSlots.filter(t => t !== null);
            // Önce sayıya, sonra renge göre sırala (Eşleri yan yana getirir)
            taslar.sort((a, b) => {
                let sayiA = a.sayi === '★' ? 0 : a.sayi;
                let sayiB = b.sayi === '★' ? 0 : b.sayi;
                if (sayiA === sayiB) return a.renk.localeCompare(b.renk);
                return sayiA - sayiB;
            });
            istakaSlots = new Array(34).fill(null);
            taslar.forEach((t, i) => istakaSlots[i] = t);
            istakayiCiz();
        }

        // --- ISTAKA VE SEÇİM EKRANI ---
        function istakayiCiz() {
            const izgara = document.getElementById("istaka-izgara");
            izgara.innerHTML = "";
            let anlikToplam = 0;

            for(let i=0; i<34; i++) {
                let slot = document.createElement("div");
                slot.className = "slot";
                
                // Drag & Drop
                slot.addEventListener("dragover", (e) => { e.preventDefault(); slot.classList.add("drag-over"); });
                slot.addEventListener("dragleave", () => slot.classList.remove("drag-over"));
                slot.addEventListener("drop", (e) => {
                    e.preventDefault();
                    slot.classList.remove("drag-over");
                    let fromIndex = parseInt(e.dataTransfer.getData("slotIndex"));
                    
                    let temp = istakaSlots[i];
                    istakaSlots[i] = istakaSlots[fromIndex];
                    istakaSlots[fromIndex] = temp;
                    seciliSlotlar = []; // Yer değişince seçimleri temizle
                    istakayiCiz();
                });

                if(istakaSlots[i]) {
                    let tasObj = istakaSlots[i];
                    let tasDiv = document.createElement("div");
                    tasDiv.className = `tas ${tasObj.renk}`;
                    tasDiv.innerText = tasObj.sayi;
                    tasDiv.draggable = true;

                    // Seçim efekti
                    if(seciliSlotlar.includes(i)) {
                        tasDiv.classList.add("secili");
                        anlikToplam += (tasObj.sayi === '★' ? 0 : tasObj.sayi);
                    }

                    // Tıklayarak seçme
                    tasDiv.onclick = () => {
                        if (seciliSlotlar.includes(i)) {
                            seciliSlotlar = seciliSlotlar.filter(ind => ind !== i);
                        } else {
                            seciliSlotlar.push(i);
                        }
                        istakayiCiz();
                    };

                    tasDiv.addEventListener("dragstart", (e) => { e.dataTransfer.setData("slotIndex", i); });
                    slot.appendChild(tasDiv);
                }
                izgara.appendChild(slot);
            }
            document.getElementById("toplam-puan").innerText = `Seçili Toplam: ${anlikToplam}`;
        }

        // --- 101 KURALI İLE YERE AÇMA ---
        function secilileriAc() {
            if (seciliSlotlar.length < 3) return alert("Per (grup) oluşturmak için en az 3 taş seçmelisiniz!");

            let seciliTaslarObj = seciliSlotlar.map(i => istakaSlots[i]);
            let toplamSayi = seciliTaslarObj.reduce((sum, tas) => sum + (tas.sayi === '★' ? 0 : tas.sayi), 0);

            // 101 Kontrolü (Sadece ilk açılışta)
            if (!ilkAcilisYapildiMi) {
                if (toplamSayi < 101) {
                    return alert(`Seçtiğiniz taşların toplamı ${toplamSayi}. Yere açabilmek için 101 barajını geçmelisiniz!`);
                }
                ilkAcilisYapildiMi = true; // Baraj geçildi, artık serbest!
            }

            // Seçilenleri masaya gönder
            let masa = document.getElementById("masadaki-seriler");
            let perGrubu = document.createElement("div");
            perGrubu.className = "per-grubu";

            seciliTaslarObj.forEach(tas => {
                let div = document.createElement("div");
                div.className = `tas ${tas.renk}`;
                div.style.transform = "scale(0.8)";
                div.style.margin = "-5px";
                div.innerText = tas.sayi;
                perGrubu.appendChild(div);
            });
            masa.appendChild(perGrubu);

            // Istakadan sil
            seciliSlotlar.forEach(i => istakaSlots[i] = null);
            seciliSlotlar = [];
            istakayiCiz();
        }

        // --- DİĞER OYUN MEKANİKLERİ ---
        const copDiv = document.getElementById("yandaki-cop");
        copDiv.addEventListener("dragover", (e) => { e.preventDefault(); copDiv.classList.add("drag-over"); });
        copDiv.addEventListener("dragleave", () => copDiv.classList.remove("drag-over"));
        copDiv.addEventListener("drop", (e) => {
            e.preventDefault();
            copDiv.classList.remove("drag-over");
            if (siraKimde !== 0 || !tasCekildiMi) return alert("Sıra sende değil veya henüz taş çekmedin!");

            let fromIndex = parseInt(e.dataTransfer.getData("slotIndex"));
            atilanTaslar.push(istakaSlots[fromIndex]);
            istakaSlots[fromIndex] = null;
            
            seciliSlotlar = [];
            tasCekildiMi = false;
            siraKimde = 1; 
            istakayiCiz(); guncelle(); siraKontrol();
        });

        function guncelle() {
            document.getElementById("deste-sayi").innerText = deste.length;
            document.getElementById("bot1-sayi").innerText = bot1Tasi.length;
            document.getElementById("bot2-sayi").innerText = bot2Tasi.length;
            document.getElementById("bot3-sayi").innerText = bot3Tasi.length;

            if (atilanTaslar.length > 0) {
                let sT = atilanTaslar[atilanTaslar.length - 1];
                copDiv.innerHTML = `<div class="tas ${sT.renk}" style="transform:scale(0.9); margin:0;">${sT.sayi}</div>`;
                copDiv.style.border = "none"; copDiv.style.background = "transparent";
            }
        }

        function tasCek() {
            if (siraKimde !== 0 || tasCekildiMi) return;
            let bos = istakaSlots.indexOf(null);
            if(bos !== -1) { istakaSlots[bos] = deste.pop(); tasCekildiMi = true; istakayiCiz(); guncelle(); }
        }

        function siraKontrol() {
            const isimler = ["Sen", "Bot 1", "Bot 2", "Bot 3"];
            document.getElementById("sira-bilgi").innerText = `Sıra: ${isimler[siraKimde]}`;
            if (siraKimde !== 0) setTimeout(botOynasin, 1000);
        }

        function botOynasin() {
            let aktif = (siraKimde === 1) ? bot1Tasi : (siraKimde === 2) ? bot2Tasi : bot3Tasi;
            aktif.push(deste.pop());
            atilanTaslar.push(aktif.splice(Math.floor(Math.random() * aktif.length), 1)[0]);
            siraKimde = (siraKimde + 1) % 4;
            guncelle(); siraKontrol();
        }

        oyunuBaslat();
    </script>
</body>
</html>
