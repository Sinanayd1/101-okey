<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>101 Okey Plus - Otomatik Hesaplama</title>
    <style>
        body { margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, sans-serif; background: radial-gradient(circle at center, #2a7a96, #114256); color: white; height: 100vh; display: flex; align-items: center; justify-content: center; user-select: none; overflow: hidden; }
        .oyun-alani { position: relative; width: 1250px; height: 750px; }

        /* ORTA MASA */
        .orta-masa { position: absolute; top: 80px; left: 220px; right: 220px; bottom: 220px; background-color: #12354e; border: 2px solid #235e82; border-radius: 12px; box-shadow: inset 0 0 50px rgba(0,0,0,0.5); background-image: linear-gradient(rgba(255,255,255,0.03) 1px, transparent 1px), linear-gradient(90deg, rgba(255,255,255,0.03) 1px, transparent 1px); background-size: 30px 30px; padding: 15px; }
        
        /* OYUNCU VE ÇÖP KUTULARI */
        .oyuncu-kutu { position: absolute; display: flex; flex-direction: column; align-items: center; background: rgba(0,0,0,0.4); border-radius: 8px; border: 1px solid rgba(255,255,255,0.2); width: 70px; padding: 5px; }
        .avatar { width: 40px; height: 40px; background: #95a5a6; border-radius: 50%; border: 2px solid white; display: flex; align-items: center; justify-content: center; }
        .isim { font-size: 10px; margin-top: 5px; text-align: center; }
        
        .oyuncu-sol { top: 250px; left: 50px; }
        .oyuncu-ust { top: 20px; left: 50%; transform: translateX(-50%); flex-direction: row; width: auto; }
        .oyuncu-sag { top: 250px; right: 50px; }

        /* ÇÖP KUTULARI */
        .cop-kutu { width: 45px; height: 65px; background: rgba(0,0,0,0.5); border: 1px solid rgba(255,255,255,0.2); border-radius: 6px; display: flex; align-items: center; justify-content: center; position: absolute; }
        .cop-sol { top: 255px; left: 140px; }
        .cop-ust { top: 85px; left: 47%; }
        .cop-sag { top: 255px; right: 140px; }

        /* --- SAĞ ÜST ÇÖP (SENİN ATACAĞIN YER) --- */
        .cop-sen { bottom: 205px; right: 230px; border: 2px dashed #f1c40f; background: rgba(231, 76, 60, 0.2); z-index: 100; color: #f1c40f; font-size: 10px; text-align: center; font-weight: bold; }
        .cop-sen.drag-over { background: rgba(231, 76, 60, 0.8); transform: scale(1.1); }

        /* ISTAKA VE BUTONLAR */
        .alt-panel { position: absolute; bottom: 30px; left: 50%; transform: translateX(-50%); display: flex; align-items: flex-end; gap: 10px; }
        .istaka { background: linear-gradient(to bottom, #d69038, #9e5b15); padding: 12px; border-radius: 12px; border-bottom: 8px solid #5e3204; box-shadow: 0 10px 30px rgba(0,0,0,0.6); }
        .istaka-raf { display: grid; grid-template-columns: repeat(20, 45px); gap: 3px; background: rgba(0,0,0,0.2); padding: 6px; border-radius: 6px; }
        .slot { width: 45px; height: 65px; background: rgba(0,0,0,0.2); border-radius: 6px; display: flex; align-items: center; justify-content: center; }
        
        .dikey-btn { width: 55px; height: 140px; background: #2b4560; border: 2px solid #487eb0; border-radius: 10px; color: white; display: flex; flex-direction: column; align-items: center; justify-content: center; font-weight: bold; cursor: pointer; }
        .dikey-btn span { font-size: 10px; margin-top: 5px; color: #bdc3c7; }

        /* TAŞ TASARIMI */
        .tas { width: 45px; height: 65px; background: white; border-radius: 6px; display: flex; align-items: center; justify-content: center; font-size: 26px; font-weight: 900; color: #1e272e; box-shadow: 1px 2px 5px rgba(0,0,0,0.4); cursor: grab; border: 1px solid #bdc3c7; }
        .siyah { color: #1e272e; } .kirmizi { color: #c0392b; } .mavi { color: #0984e3; } .sari { color: #d4ac0d; }
        .tas.per-parcasi { border: 2px solid #2ecc71; background: #fafffa; }

        /* PUAN VE AÇMA */
        .kontrol-merkezi { position: absolute; bottom: 180px; left: 50%; transform: translateX(-50%); text-align: center; z-index: 10; }
        .puan-kart { background: rgba(0,0,0,0.8); padding: 8px 25px; border-radius: 20px; border: 1px solid #f1c40f; margin-bottom: 10px; }
        .puan-kart span { font-size: 24px; font-weight: bold; color: #f1c40f; }
        .btn-ac { background: #27ae60; border: none; color: white; padding: 10px 50px; border-radius: 25px; font-size: 18px; font-weight: bold; cursor: pointer; box-shadow: 0 4px 0 #1e8449; }
        .btn-ac:active { transform: translateY(3px); box-shadow: none; }
    </style>
</head>
<body>

    <div class="oyun-alani">
        <div class="oyuncu-kutu oyuncu-sol"><div class="avatar">👤</div><div class="isim">Cüneyt C.</div></div>
        <div class="cop-kutu cop-sol" id="cop-bot1"></div>
        <div class="oyuncu-kutu oyuncu-ust"><div class="avatar">👤</div><div class="isim">M14366918</div></div>
        <div class="cop-kutu cop-ust" id="cop-bot2"></div>
        <div class="oyuncu-kutu oyuncu-sag"><div class="avatar">👤</div><div class="isim">M40463335</div></div>
        <div class="cop-kutu cop-sag" id="cop-bot3"></div>

        <div class="orta-masa" id="masa-seriler">
            <div style="font-size: 40px; color: rgba(255,255,255,0.05); font-weight: 900; position: absolute; left: 50%; top: 50%; transform: translate(-50%, -50%);">101 PLUS</div>
        </div>

        <div class="cop-kutu cop-sen" id="cop-sen">ATILACAK<br>TAŞ</div>

        <div class="kontrol-merkezi">
            <div class="puan-kart">Toplam Per: <span id="otomatik-puan">0</span></div>
            <button class="btn-ac" onclick="otomatikYereAc()">YERE AÇ</button>
        </div>

        <div class="alt-panel">
            <div class="dikey-btn" style="border-color:#9b59b6;" onclick="ciftDiz()">Ç<br>İ<br>F<br>T<span>DİZ</span></div>
            <div class="istaka">
                <div class="istaka-raf" id="raf-ust"></div>
                <div class="istaka-raf" id="raf-alt"></div>
            </div>
            <div class="dikey-btn" style="border-color:#3498db;" onclick="seriDiz()">S<br>E<br>R<br>İ<span>DİZ</span></div>
        </div>
    </div>

    <script>
        const renkler = ["sari", "mavi", "siyah", "kirmizi"];
        let deste = [], botlar = [[],[],[]], atilanlar = {sen:[], bot1:[], bot2:[], bot3:[]};
        let istaka = new Array(40).fill(null), sira = 0, tasCekildi = false;
        let otomatikPerler = [];

        function baslat() {
            for(let i=0; i<2; i++) renkler.forEach(r => { for(let s=1; s<=13; s++) deste.push({r, s}); });
            deste = deste.sort(() => Math.random() - 0.5);
            let ilk = deste.splice(0, 22);
            ilk.forEach((t, i) => istaka[i] = t);
            seriDiz();
            guncelleUI();
        }

        function tasHTML(t) {
            let d = document.createElement("div");
            d.className = `tas ${t.r}`;
            d.innerText = t.s;
            d.draggable = true;
            return d;
        }

        /* --- OTOMATİK PER BULMA MANTIĞI --- */
        function perBul() {
            otomatikPerler = [];
            let tiles = istaka.filter(t => t !== null);
            let toplamPuan = 0;

            // Seri Perleri Bul (Aynı renk ardışık)
            let tempSeri = [];
            for (let i = 0; i < tiles.length; i++) {
                if (tempSeri.length === 0) { tempSeri.push(tiles[i]); }
                else {
                    let son = tempSeri[tempSeri.length - 1];
                    if (tiles[i].r === son.r && tiles[i].s === son.s + 1) {
                        tempSeri.push(tiles[i]);
                    } else {
                        if (tempSeri.length >= 3) {
                            otomatikPerler.push([...tempSeri]);
                            tempSeri.forEach(t => toplamPuan += t.s);
                        }
                        tempSeri = [tiles[i]];
                    }
                }
            }
            if (tempSeri.length >= 3) {
                otomatikPerler.push([...tempSeri]);
                tempSeri.forEach(t => toplamPuan += t.s);
            }

            document.getElementById("otomatik-puan").innerText = toplamPuan;
        }

        function seriDiz() {
            let tiles = istaka.filter(t => t !== null);
            tiles.sort((a,b) => a.r.localeCompare(b.r) || a.s - b.s);
            istaka.fill(null);
            tiles.forEach((t, i) => istaka[i] = t);
            perBul();
            cizIstaka();
        }

        function ciftDiz() {
            let tiles = istaka.filter(t => t !== null);
            tiles.sort((a,b) => a.s - b.s || a.r.localeCompare(b.r));
            istaka.fill(null);
            tiles.forEach((t, i) => istaka[i] = t);
            cizIstaka();
        }

        function cizIstaka() {
            const u = document.getElementById("raf-ust"), a = document.getElementById("raf-alt");
            u.innerHTML = ""; a.innerHTML = "";
            istaka.forEach((t, i) => {
                let slot = document.createElement("div");
                slot.className = "slot";
                slot.ondragover = e => e.preventDefault();
                slot.ondrop = e => {
                    let from = e.dataTransfer.getData("idx");
                    [istaka[i], istaka[from]] = [istaka[from], istaka[i]];
                    perBul(); cizIstaka();
                };
                if(t) {
                    let d = tasHTML(t);
                    // Eğer taş bir perin parçasıysa işaretle
                    if(otomatikPerler.flat().some(p => p.r === t.r && p.s === t.s)) d.classList.add("per-parcasi");
                    d.ondragstart = e => e.dataTransfer.setData("idx", i);
                    d.ondblclick = () => tasAt(i);
                    slot.appendChild(d);
                }
                (i < 20 ? u : a).appendChild(slot);
            });
        }

        function tasAt(i) {
            if(sira !== 0 || !tasCekildi) return;
            atilanlar.sen.push(istaka[i]);
            istaka[i] = null;
            tasCekildi = false; sira = 1;
            guncelleUI(); perBul(); cizIstaka(); setTimeout(botOyna, 1000);
        }

        function tasCek() {
            if(sira !== 0 || tasCekildi) return;
            let bos = istaka.indexOf(null);
            if(bos!==-1) { istaka[bos] = deste.pop(); tasCekildi = true; cizIstaka(); }
        }

        function otomatikYereAc() {
            let puan = parseInt(document.getElementById("otomatik-puan").innerText);
            if(puan < 101) return alert("Perlerin toplamı 101 etmiyor! Şu an: " + puan);
            
            let masa = document.getElementById("masa-seriler");
            otomatikPerler.forEach(per => {
                let div = document.createElement("div");
                div.style.display = "flex"; div.style.margin = "5px";
                per.forEach(t => {
                    let td = tasHTML(t); td.style.transform = "scale(0.8)";
                    div.appendChild(td);
                    // Istakadan sil
                    let idx = istaka.findIndex(it => it && it.r === t.r && it.s === t.s);
                    if(idx !== -1) istaka[idx] = null;
                });
                masa.appendChild(div);
            });
            perBul(); cizIstaka();
        }

        function guncelleUI() {
            ["sen", "bot1", "bot2", "bot3"].forEach(k => {
                let e = document.getElementById("cop-"+k);
                if(atilanlar[k].length > 0) {
                    let t = atilanlar[k][atilanlar[k].length-1];
                    e.innerHTML = ""; e.appendChild(tasHTML(t)); e.style.border = "none";
                }
            });
        }

        function botOyna() {
            atilanlar["bot"+sira].push(deste.pop());
            sira = (sira + 1) % 4;
            guncelleUI(); if(sira !== 0) setTimeout(botOyna, 1000);
        }

        // ÇÖP SÜRÜKLEME (SAĞ ÜST)
        const cSen = document.getElementById("cop-sen");
        cSen.ondragover = e => { e.preventDefault(); cSen.classList.add("drag-over"); };
        cSen.ondragleave = () => cSen.classList.remove("drag-over");
        cSen.ondrop = e => {
            cSen.classList.remove("drag-over");
            tasAt(e.dataTransfer.getData("idx"));
        };

        baslat();
    </script>
</body>
</html>
