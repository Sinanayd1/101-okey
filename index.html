<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Gelişmiş 101 Okey Simülasyonu</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background-color: #1b4d29; color: white; margin: 0; display: flex; flex-direction: column; align-items: center; justify-content: flex-start; height: 100vh; user-select: none; overflow-x: hidden; }
        
        .masa-container { display: grid; grid-template-columns: 200px 1fr 200px; grid-template-rows: 120px 1fr auto; gap: 20px; width: 98vw; max-width: 1600px; height: 95vh; padding-top: 20px; }
        
        /* OYUNCU VE BOT ALANLARI */
        .oyuncu-kart { background: rgba(0,0,0,0.6); padding: 15px; border-radius: 10px; text-align: center; border: 2px solid #27ae60; display: flex; flex-direction: column; justify-content: center; align-items: center; position: relative; }
        #bot2-alan { grid-column: 2; grid-row: 1; flex-direction: row; gap: 30px; }
        #bot1-alan { grid-column: 1; grid-row: 2; }
        #bot3-alan { grid-column: 3; grid-row: 2; }

        /* KİŞİSEL ÇÖP KUTULARI (Kimin ne attığını görmek için) */
        .kisisel-cop { width: 45px; height: 65px; background: rgba(0,0,0,0.5); border: 2px dashed #bdc3c7; border-radius: 6px; display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: bold; margin-top: 10px; }
        #cop-bot2 { margin-top: 0; }
        #cop-sen { width: 55px; height: 80px; border-color: #f1c40f; font-size: 14px; background: rgba(231, 76, 60, 0.2); transition: 0.2s; }
        #cop-sen.drag-over { background: rgba(231, 76, 60, 0.8); transform: scale(1.1); }

        /* ORTA MASA */
        .orta-masa { grid-column: 2; grid-row: 2; background: #0e3519; border-radius: 100px; padding: 20px; display: flex; flex-direction: column; box-shadow: inset 0 0 50px rgba(0,0,0,0.8); border: 15px solid #2ecc71; }
        .cekme-ve-gosterge { display: flex; justify-content: center; gap: 50px; margin-bottom: 20px; }
        
        .deste { width: 55px; height: 80px; background: #ecf0f1; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-weight: bold; font-size: 20px; color: #2c3e50; cursor: pointer; border: 2px solid #bdc3c7; box-shadow: 3px 3px 10px rgba(0,0,0,0.5); }
        .gosterge-alani { display: flex; flex-direction: column; align-items: center; font-size: 14px; color: #f1c40f; font-weight: bold; }
        
        .yere-acilanlar { flex-grow: 1; background: rgba(0,0,0,0.3); border-radius: 20px; padding: 15px; display: flex; flex-wrap: wrap; gap: 15px; border: 2px dashed #f1c40f; overflow-y: auto; align-content: flex-start; }
        .per-grubu { display: flex; gap: 2px; background: rgba(255,255,255,0.1); padding: 5px; border-radius: 8px; }

        /* ISTAKA VE BÖLMELER (BÜYÜTÜLDÜ) */
        #benim-alan { grid-column: 2; grid-row: 3; display: flex; flex-direction: column; align-items: center; gap: 10px; }
        
        .istaka-konteyner { display: flex; align-items: flex-end; gap: 20px; }
        
        /* 40 Bölmeli Geniş Istaka */
        .istaka-izgara { background: #5c2e0b; padding: 15px; border-radius: 15px; display: grid; grid-template-columns: repeat(20, 55px); grid-template-rows: 80px 80px; gap: 8px; box-shadow: inset 0 20px 20px rgba(0,0,0,0.7); border-bottom: 10px solid #3e1e06; border-left: 5px solid #8B4513; border-right: 5px solid #8B4513; }
        .slot { background: rgba(0,0,0,0.25); border-radius: 8px; width: 100%; height: 100%; box-shadow: inset 0 3px 6px rgba(0,0,0,0.6); display: flex; align-items: center; justify-content: center; }
        .slot.drag-over { background: rgba(255,255,255,0.3); }

        /* TAŞ TASARIMI */
        .tas { width: 55px; height: 80px; background: #fffcf0; border-radius: 8px; display: flex; flex-direction: column; align-items: center; justify-content: center; font-size: 28px; font-weight: 900; box-shadow: 2px 2px 6px rgba(0,0,0,0.5); cursor: grab; border: 1px solid #dcdde1; transition: transform 0.1s; position: relative; }
        .tas:active { cursor: grabbing; }
        .tas.secili { transform: translateY(-15px); border: 3px solid #f1c40f; box-shadow: 0 0 15px #f1c40f; }
        
        /* GERÇEK OKEY TAŞI EFEKTİ */
        .tas.gercek-okey { border: 4px solid #9b59b6; box-shadow: 0 0 20px #9b59b6; }
        .tas.gercek-okey::after { content: "★"; position: absolute; top: 2px; right: 4px; font-size: 14px; color: #9b59b6; }

        .sari { color: #f39c12; } .mavi { color: #2980b9; } .siyah { color: #2c3e50; } .kirmizi { color: #c0392b; }

        .buton-grubu { display: flex; gap: 15px; }
        button { padding: 12px 20px; font-size: 16px; font-weight: bold; cursor: pointer; border: none; border-radius: 5px; color: white; transition: 0.2s; box-shadow: 0 4px 6px rgba(0,0,0,0.3); }
        .btn-mavi { background: #3498db; } .btn-mavi:hover { background: #2980b9; transform: translateY(-2px); }
        .btn-yesil { background: #27ae60; } .btn-yesil:hover { background: #2ecc71; transform: translateY(-2px); }

        #bilgi-paneli { position: absolute; top: 15px; left: 20px; background: rgba(0,0,0,0.7); padding: 15px; border-radius: 10px; border: 1px solid #f1c40f; }
        .bilgi-metin { font-size: 18px; color: #f1c40f; font-weight: bold; margin-bottom: 5px; }
    </style>
</head>
<body>

    <div id="bilgi-paneli">
        <div class="bilgi-metin" id="sira-bilgi">Sıra: Sen</div>
        <div class="bilgi-metin" style="color: white;" id="toplam-puan">Seçili Toplam: 0</div>
    </div>

    <div class="masa-container">
        <div class="oyuncu-kart" id="bot2-alan">
            <h3>Bot 2</h3>
            <p>Taş: <span id="bot2-sayi">21</span></p>
            <div class="kisisel-cop" id="cop-bot2">Boş</div>
        </div>

        <div class="oyuncu-kart" id="bot1-alan">
            <h3>Bot 1</h3>
            <p>Taş: <span id="bot1-sayi">21</span></p>
            <div class="kisisel-cop" id="cop-bot1">Boş</div>
        </div>

        <div class="orta-masa">
            <div class="cekme-ve-gosterge">
                <div class="deste" onclick="tasCek()">ÇEK<br><span id="deste-sayi">0</span></div>
                
                <div class="gosterge-alani">
                    <div>GÖSTERGE</div>
                    <div id="gosterge-tas-alani" style="margin-top: 5px;"></div>
                </div>
            </div>
            <div class="yere-acilanlar" id="masadaki-seriler"></div>
        </div>

        <div class="oyuncu-kart" id="bot3-alan">
            <h3>Bot 3</h3>
            <p>Taş: <span id="bot3-sayi">21</span></p>
            <div class="kisisel-cop" id="cop-bot3">Boş</div>
        </div>

        <div id="benim-alan">
            <div class="buton-grubu">
                <button class="btn-mavi" onclick="seriDiz()">Seri Diz</button>
                <button class="btn-mavi" onclick="ciftDiz()">Çift Diz</button>
                <button class="btn-yesil" onclick="secilileriAc()">Seçili Taşları Yere Aç (Kural: 101)</button>
            </div>
            
            <div class="istaka-konteyner">
                <div class="istaka-izgara" id="istaka-izgara"></div>
                
                <div>
                    <div style="text-align: center; font-weight: bold; margin-bottom: 5px;">ATILACAK<br>TAŞ</div>
                    <div class="kisisel-cop" id="cop-sen">SÜRÜKLE</div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const renkler = ["sari", "mavi", "siyah", "kirmizi"];
        let deste = [], bot1Tasi = [], bot2Tasi = [], bot3Tasi = [];
        
        // Herkesin kendi atılan taşlar (çöp) listesi var
        let atilanlar = { sen: [], bot1: [], bot2: [], bot3: [] };
        
        let siraKimde = 0; 
        let tasCekildiMi = false;
        let ilkAcilisYapildiMi = false;
        
        let gosterge = null;
        let gercekOkey = null;

        // 40 bölmeli Istaka
        let istakaSlots = new Array(40).fill(null);
        let seciliSlotlar = []; 

        function oyunuBaslat() {
            // Deste Oluştur
            for (let i = 0; i < 2; i++) {
                renkler.forEach(renk => {
                    for (let sayi = 1; sayi <= 13; sayi++) { deste.push({ renk, sayi, tip: 'normal' }); }
                });
            }
            deste.push({ renk: "siyah", sayi: "★", tip: 'sahte' }, { renk: "kirmizi", sayi: "★", tip: 'sahte' });
            deste = deste.sort(() => Math.random() - 0.5);

            // Gösterge ve Okey Belirleme
            gosterge = deste.pop();
            let okeySayisi = gosterge.sayi === 13 ? 1 : gosterge.sayi + 1;
            gercekOkey = { renk: gosterge.renk, sayi: okeySayisi };

            // Göstergeyi Ekrana Çiz
            let gAlan = document.getElementById("gosterge-tas-alani");
            gAlan.innerHTML = `<div class="tas ${gosterge.renk}" style="transform: scale(0.9); margin:0;">${gosterge.sayi}</div>`;

            // Dağıtım
            let oyuncuIlkTaslari = deste.splice(0, 22);
            for(let i=0; i<22; i++) istakaSlots[i] = oyuncuIlkTaslari[i];

            bot1Tasi = deste.splice(0, 21);
            bot2Tasi = deste.splice(0, 21);
            bot3Tasi = deste.splice(0, 21);

            seriDiz(); 
        }

        // Taşı çizerken Okey olup olmadığını kontrol eden fonksiyon
        function tasHTMLOlustur(tasObj, extraClass = "") {
            let tasDiv = document.createElement("div");
            tasDiv.className = `tas ${tasObj.renk} ${extraClass}`;
            tasDiv.innerText = tasObj.sayi;
            
            // Eğer bu taş belirlenen okey ise parlasın
            if (tasObj.tip !== 'sahte' && tasObj.renk === gercekOkey.renk && tasObj.sayi === gercekOkey.sayi) {
                tasDiv.classList.add("gercek-okey");
            }
            return tasDiv;
        }

        function seriDiz() {
            seciliSlotlar = [];
            let taslar = istakaSlots.filter(t => t !== null);
            taslar.sort((a, b) => {
                if (a.renk === b.renk) return (a.sayi === '★' ? 0 : a.sayi) - (b.sayi === '★' ? 0 : b.sayi);
                return a.renk.localeCompare(b.renk);
            });
            istakaSlots = new Array(40).fill(null); // Temizle
            
            // Taşları biraz daha ortalayarak dizelim
            let baslangic = 0;
            taslar.forEach((t, i) => istakaSlots[baslangic + i] = t);
            istakayiCiz();
        }

        function ciftDiz() {
            seciliSlotlar = [];
            let taslar = istakaSlots.filter(t => t !== null);
            taslar.sort((a, b) => {
                let sA = a.sayi === '★' ? 0 : a.sayi;
                let sB = b.sayi === '★' ? 0 : b.sayi;
                if (sA === sB) return a.renk.localeCompare(b.renk);
                return sA - sB;
            });
            istakaSlots = new Array(40).fill(null);
            taslar.forEach((t, i) => istakaSlots[i] = t);
            istakayiCiz();
        }

        function istakayiCiz() {
            const izgara = document.getElementById("istaka-izgara");
            izgara.innerHTML = "";
            let anlikToplam = 0;

            for(let i=0; i<40; i++) {
                let slot = document.createElement("div");
                slot.className = "slot";
                
                slot.addEventListener("dragover", (e) => { e.preventDefault(); slot.classList.add("drag-over"); });
                slot.addEventListener("dragleave", () => slot.classList.remove("drag-over"));
                slot.addEventListener("drop", (e) => {
                    e.preventDefault();
                    slot.classList.remove("drag-over");
                    let fromIndex = parseInt(e.dataTransfer.getData("slotIndex"));
                    
                    let temp = istakaSlots[i];
                    istakaSlots[i] = istakaSlots[fromIndex];
                    istakaSlots[fromIndex] = temp;
                    seciliSlotlar = [];
                    istakayiCiz();
                });

                if(istakaSlots[i]) {
                    let tasObj = istakaSlots[i];
                    let tasDiv = tasHTMLOlustur(tasObj);
                    tasDiv.draggable = true;

                    if(seciliSlotlar.includes(i)) {
                        tasDiv.classList.add("secili");
                        // Okey seçilirse toplam sayıya etkisi kurallara göre değişir ama şimdilik kendi değeriyle toplayalım
                        anlikToplam += (tasObj.sayi === '★' ? 0 : tasObj.sayi);
                    }

                    tasDiv.onclick = () => {
                        if (seciliSlotlar.includes(i)) seciliSlotlar = seciliSlotlar.filter(ind => ind !== i);
                        else seciliSlotlar.push(i);
                        istakayiCiz();
                    };

                    tasDiv.addEventListener("dragstart", (e) => { e.dataTransfer.setData("slotIndex", i); });
                    slot.appendChild(tasDiv);
                }
                izgara.appendChild(slot);
            }
            document.getElementById("toplam-puan").innerText = `Seçili Toplam: ${anlikToplam}`;
        }

        function secilileriAc() {
            if (seciliSlotlar.length < 3) return alert("Per (grup) oluşturmak için en az 3 taş seçmelisiniz!");

            let seciliTaslarObj = seciliSlotlar.map(i => istakaSlots[i]);
            let toplamSayi = seciliTaslarObj.reduce((sum, tas) => sum + (tas.sayi === '★' ? 0 : tas.sayi), 0);

            if (!ilkAcilisYapildiMi) {
                if (toplamSayi < 101) return alert(`Toplam ${toplamSayi}. 101 barajını geçmelisiniz!`);
                ilkAcilisYapildiMi = true;
            }

            let masa = document.getElementById("masadaki-seriler");
            let perGrubu = document.createElement("div");
            perGrubu.className = "per-grubu";

            seciliTaslarObj.forEach(tas => {
                let div = tasHTMLOlustur(tas);
                div.style.transform = "scale(0.8)";
                div.style.margin = "-8px";
                perGrubu.appendChild(div);
            });
            masa.appendChild(perGrubu);

            seciliSlotlar.forEach(i => istakaSlots[i] = null);
            seciliSlotlar = [];
            istakayiCiz();
        }

        // --- SENİN ÇÖP KUTUNA SÜRÜKLE BIRAK (TAŞ ATMA) ---
        const senCopDiv = document.getElementById("cop-sen");
        senCopDiv.addEventListener("dragover", (e) => { e.preventDefault(); senCopDiv.classList.add("drag-over"); });
        senCopDiv.addEventListener("dragleave", () => senCopDiv.classList.remove("drag-over"));
        senCopDiv.addEventListener("drop", (e) => {
            e.preventDefault();
            senCopDiv.classList.remove("drag-over");
            if (siraKimde !== 0 || !tasCekildiMi) return alert("Sıra sende değil veya taş çekmedin!");

            let fromIndex = parseInt(e.dataTransfer.getData("slotIndex"));
            atilanlar.sen.push(istakaSlots[fromIndex]);
            istakaSlots[fromIndex] = null;
            
            seciliSlotlar = [];
            tasCekildiMi = false;
            siraKimde = 1; 
            istakayiCiz(); guncelle(); siraKontrol();
        });

        function guncelle() {
            document.getElementById("deste-sayi").innerText = deste.length;
            document.getElementById("bot1-sayi").innerText = bot1Tasi.length;
            document.getElementById("bot2-sayi").innerText = bot2Tasi.length;
            document.getElementById("bot3-sayi").innerText = bot3Tasi.length;

            // Herkesin çöpünü güncelle
            guncelleKisiselCop("cop-sen", atilanlar.sen);
            guncelleKisiselCop("cop-bot1", atilanlar.bot1);
            guncelleKisiselCop("cop-bot2", atilanlar.bot2);
            guncelleKisiselCop("cop-bot3", atilanlar.bot3);
        }

        function guncelleKisiselCop(elementId, atilanListe) {
            let el = document.getElementById(elementId);
            if (atilanListe.length > 0) {
                let sT = atilanListe[atilanListe.length - 1];
                let tasDiv = tasHTMLOlustur(sT);
                tasDiv.style.transform = (elementId === "cop-sen") ? "scale(0.7)" : "scale(0.6)";
                tasDiv.style.margin = "0";
                el.innerHTML = "";
                el.appendChild(tasDiv);
                el.style.border = "none";
                el.style.background = "transparent";
            } else {
                el.innerHTML = (elementId === "cop-sen") ? "SÜRÜKLE" : "Boş";
            }
        }

        function tasCek() {
            if (siraKimde !== 0 || tasCekildiMi) return;
            let bos = istakaSlots.indexOf(null);
            if(bos !== -1) { istakaSlots[bos] = deste.pop(); tasCekildiMi = true; istakayiCiz(); guncelle(); }
        }

        function siraKontrol() {
            const isimler = ["Sen", "Bot 1", "Bot 2", "Bot 3"];
            document.getElementById("sira-bilgi").innerText = `Sıra: ${isimler[siraKimde]}`;
            if (siraKimde !== 0) setTimeout(botOynasin, 1500); // 1.5 saniye düşünme payı
        }

        function botOynasin() {
            let aktif; let aktifCop;
            if(siraKimde === 1) { aktif = bot1Tasi; aktifCop = atilanlar.bot1; }
            else if(siraKimde === 2) { aktif = bot2Tasi; aktifCop = atilanlar.bot2; }
            else { aktif = bot3Tasi; aktifCop = atilanlar.bot3; }

            aktif.push(deste.pop());
            aktifCop.push(aktif.splice(Math.floor(Math.random() * aktif.length), 1)[0]);
            
            siraKimde = (siraKimde + 1) % 4;
            guncelle(); siraKontrol();
        }

        oyunuBaslat();
    </script>
</body>
</html>
